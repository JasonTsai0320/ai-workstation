<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 提示詞工作站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f8;
    --surface: #ffffff;
    --surface2: #f0eff5;
    --border: #e2e0ec;
    --border2: #d0cee0;
    --accent: #7c6ff7;
    --accent-light: #eeecff;
    --accent2: #0facd9;
    --text: #2a2840;
    --text2: #6b6888;
    --text3: #a09dc0;
    --writing: #7c6ff7;
    --writing-bg: #eeecff;
    --lesson: #0db39e;
    --lesson-bg: #e0f7f4;
    --learning: #f59e0b;
    --learning-bg: #fef3cd;
    --tool: #e85d8a;
    --tool-bg: #fde8f1;
    --xie-bg: #e8f5ee;
    --xie: #1a8a5a;
    --zuo-bg: #fff3e0;
    --zuo: #b85c00;
    --li-bg: #ede9ff;
    --li: #5b44c4;
    --shadow: 0 2px 12px rgba(124,111,247,0.07);
    --shadow-hover: 0 6px 24px rgba(124,111,247,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  /* Tab Navigation */
  .tab-nav {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }
  .tab-btn {
    padding: 7px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(124,111,247,0.25);
  }

  /* Main */
  .main { padding: 1.5rem 2rem 3rem; max-width: 1400px; margin: 0 auto; }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }
  .search-input {
    width: 100%;
    padding: 11px 16px 11px 42px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow);
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }
  .search-input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 17px;
  }

  /* Filter */
  .filter-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    letter-spacing: 0.06em;
    min-width: 42px;
  }
  .chip {
    padding: 4px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* Active chip colors */
  .chip.active[data-val="全部"] { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .chip.active[data-val="寫作"] { background: var(--writing-bg); color: var(--writing); border-color: var(--writing); }
  .chip.active[data-val="備課"] { background: var(--lesson-bg); color: var(--lesson); border-color: var(--lesson); }
  .chip.active[data-val="學習"] { background: var(--learning-bg); color: var(--learning); border-color: var(--learning); }
  .chip.active[data-val="工具"] { background: var(--tool-bg); color: var(--tool); border-color: var(--tool); }
  .chip.active[data-group="mode"] { background: var(--li-bg); color: var(--li); border-color: var(--li); }
  .chip.active[data-group="mode"][data-val="全部"] { background: var(--surface2); color: var(--text); border-color: var(--border2); }
  .chip.active[data-group="ai"] { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .chip.active[data-group="ai"][data-val="全部"] { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* Stats */
  .stats-bar {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 1rem;
  }
  .stats-bar span { color: var(--accent); font-weight: 700; }

  /* Cards */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 380px;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
    border-color: var(--border2);
  }
  .card-top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 16px 16px 0 0;
  }
  .card-top-bar.writing { background: var(--writing); }
  .card-top-bar.lesson { background: var(--lesson); }
  .card-top-bar.learning { background: var(--learning); }
  .card-top-bar.tool { background: var(--tool); }

  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 20px 20px 0;
    overflow: hidden;
  }
  .card-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 8px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-writing { background: var(--writing-bg); color: var(--writing); }
  .tag-lesson  { background: var(--lesson-bg);  color: var(--lesson);  }
  .tag-learning{ background: var(--learning-bg);color: var(--learning);}
  .tag-tool    { background: var(--tool-bg);    color: var(--tool);    }
  .tag-xie  { background: var(--xie-bg); color: var(--xie); }
  .tag-zuo  { background: var(--zuo-bg); color: var(--zuo); }
  .tag-li   { background: var(--li-bg);  color: var(--li);  }
  .tag-ai   { background: var(--accent-light); color: var(--accent); }
  .tag-def  { background: var(--surface2); color: var(--text2); }

  .card-task { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: 0.04em; margin-bottom: 4px; flex-shrink: 0; }
  .card-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 12px; flex-shrink: 0; }
  .card-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.75;
    flex: 1;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    padding-right: 4px;
    min-height: 0;
  }
  .card-desc::-webkit-scrollbar { width: 4px; }
  .card-desc::-webkit-scrollbar-track { background: transparent; }
  .card-desc::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .step-badge {
    font-size: 10px;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .copy-btn {
    flex: 1;
    padding: 10px 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.25);
    letter-spacing: 0.02em;
  }
  .copy-btn:hover { opacity: 0.88; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: #10b981; box-shadow: 0 2px 8px rgba(16,185,129,0.25); }

  /* Empty / Loading */
  .empty, .loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
  }
  .loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 3px;
    animation: bounce 1.2s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform:scale(0.7); opacity:0.4; }
    40% { transform:scale(1); opacity:1; }
  }

  /* Workflow */
  .workflow-section { display: none; }
  .workflow-section.active { display: block; }
  .prompt-section { display: none; }
  .prompt-section.active { display: block; }

  .workflow-intro {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 1.5rem;
    line-height: 1.7;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .workflow-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 10px;
  }
  .workflow-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow);
  }
  .workflow-btn:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .wf-icon {
    width: 34px; height: 34px;
    background: var(--accent-light);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .wf-name { flex: 1; line-height: 1.4; }
  .wf-arrow { color: var(--text3); font-size: 15px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #10b981;
    color: #fff;
    padding: 10px 22px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    box-shadow: 0 4px 16px rgba(16,185,129,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Divider in filter */
  .filter-divider {
    width: 1px; height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,18,40,0.55);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 48px rgba(124,111,247,0.18);
    animation: modalIn 0.18s ease;
  }
  @keyframes modalIn {
    from { opacity:0; transform: scale(0.97) translateY(8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .modal-header-info { flex: 1; min-width: 0; }
  .modal-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .modal-task { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .modal-close {
    width: 30px; height: 30px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text2);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--surface2); }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .modal-desc {
    font-size: 12px; color: var(--text2);
    margin-bottom: 12px; line-height: 1.7;
    padding: 10px 12px; background: var(--surface2); border-radius: 8px;
  }
  .modal-prompt-label {
    font-size: 10px; color: var(--text3); font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
  }
  .modal-prompt-text {
    font-size: 13px; color: var(--text); line-height: 1.75;
    white-space: pre-wrap; word-break: break-word;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    max-height: 320px; overflow-y: auto;
  }
  .modal-footer {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal-copy-btn {
    padding: 9px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 9px; font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif; font-weight: 500;
    cursor: pointer; transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(124,111,247,0.22);
  }
  .modal-copy-btn:hover { opacity: 0.87; }
  .modal-copy-btn.copied { background: #10b981; }
  .modal-edit-btn {
    width: 38px; height: 38px;
    background: transparent;
    color: var(--text2);
    border: 1.5px solid var(--border2);
    border-radius: 9px;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .modal-edit-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .card { cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🚀 AI <span>工作站</span></div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('prompt')">🗂 提示詞庫</button>
    <button class="tab-btn" onclick="switchTab('workflow')">⚡ 工作流程</button>
  </div>
</div>

<div class="main">

  <!-- Prompt Section -->
  <div class="prompt-section active" id="promptSection">

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋提示詞名稱、任務或內容關鍵字..." oninput="filterCards()">
    </div>

    <div class="filter-section">
      <div class="filter-row">
        <span class="filter-label">主軸</span>
        <button class="chip active" data-group="axis" data-val="全部" onclick="setFilter('axis','全部')">全部</button>
        <button class="chip" data-group="axis" data-val="寫作" onclick="setFilter('axis','寫作')">✍️ 寫作</button>
        <button class="chip" data-group="axis" data-val="備課" onclick="setFilter('axis','備課')">📚 備課</button>
        <button class="chip" data-group="axis" data-val="學習" onclick="setFilter('axis','學習')">🧠 學習</button>
        <button class="chip" data-group="axis" data-val="工具" onclick="setFilter('axis','工具')">🔧 工具</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">模式</span>
        <button class="chip active" data-group="mode" data-val="全部" onclick="setFilter('mode','全部')">全部</button>
        <button class="chip" data-group="mode" data-val="AI 協思" onclick="setFilter('mode','AI 協思')">🤝 協思</button>
        <button class="chip" data-group="mode" data-val="AI 協作" onclick="setFilter('mode','AI 協作')">⚙️ 協作</button>
        <button class="chip" data-group="mode" data-val="AI 助理" onclick="setFilter('mode','AI 助理')">🤖 助理</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">AI工具</span>
        <button class="chip active" data-group="ai" data-val="全部" onclick="setFilter('ai','全部')">全部</button>
      </div>
    </div>

    <div class="stats-bar" id="statsBar"></div>
    <div class="cards-grid" id="cardsGrid">
      <div class="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <p style="margin-top:1rem;font-size:13px;">正在讀取資料...</p>
      </div>
    </div>
  </div>

  <!-- Workflow Section -->
  <div class="workflow-section" id="workflowSection">
    <div class="workflow-intro">
      📂 點擊下方工作表按鈕，直接在 Google Sheet 中開啟對應的工作流程。
    </div>
    <div class="workflow-grid" id="workflowGrid"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-info">
        <div class="modal-tags" id="modalTags"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-task" id="modalTask"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-prompt-label">PROMPT 內容</div>
      <div class="modal-prompt-text" id="modalPrompt"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-edit-btn" id="modalEditBtn" onclick="openSheetForEdit()" title="在 Google Sheet 編輯">✏️</button>
      <button class="modal-copy-btn" id="modalCopyBtn" onclick="copyModalPrompt()">📋 複製 Prompt</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ 已複製到剪貼簿！</div>

<script>
const SHEET_ID = '10NlenChALIPNVolMhdX7u_Rgg-4JXbnJesfglu2I5yY';
const SHEET_NAME = encodeURIComponent('⓪AI提示詞');
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

const WORKFLOW_SHEETS = [
  { name: '課綱課名', icon: '📋' },
  { name: '課程行銷', icon: '📣' },
  { name: '永久筆記', icon: '📝' },
  { name: '學習筆記', icon: '🧠' },
  { name: '部落文章', icon: '✍️' },
  { name: '撰新聞稿', icon: '📰' },
  { name: '小樹風格', icon: '🌱' },
  { name: '寫作輔助', icon: '💡' },
  { name: '創作文章-P', icon: '🎨' },
];

let allData = [];
let filters = { axis: '全部', mode: '全部', ai: '全部' };

async function init() {
  buildWorkflow();
  await loadData();
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    allData = parseCSV(text);
    buildAIFilters();
    filterCards();
  } catch(e) {
    document.getElementById('cardsGrid').innerHTML = `
      <div class="empty">⚠️<br><br>無法讀取資料，請確認 Google Sheet 已設為公開檢視</div>`;
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (!cols || cols.length < 5) continue;
    const axis = clean(cols[0]);
    const mode = clean(cols[1]);
    const task = clean(cols[2]);
    const title = clean(cols[3]);
    const aiTool = clean(cols[4]);
    const order = clean(cols[5]);
    const colG = clean(cols[6]);
    const colH = clean(cols[7]);
    const content = colG || colH || '無';
    const desc = colG ? colH : '';
    if (!title) continue;
    rows.push({ axis, mode, task, title, aiTool, order, content, desc });
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

function clean(s) {
  if (!s) return '';
  return s.trim().replace(/^"|"$/g, '').trim();
}

function buildAIFilters() {
  const seen = new Set();
  const row = document.querySelector('.filter-row:last-child');
  allData.forEach(d => {
    if (!d.aiTool) return;
    d.aiTool.split(/[\/,、\s]+/).forEach(t => {
      t = t.trim();
      if (t && !seen.has(t)) {
        seen.add(t);
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.dataset.group = 'ai';
        btn.dataset.val = t;
        btn.textContent = t;
        btn.onclick = () => setFilter('ai', t);
        row.appendChild(btn);
      }
    });
  });
}

function setFilter(group, val) {
  filters[group] = val;
  document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => {
    c.classList.toggle('active', c.dataset.val === val);
  });
  filterCards();
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allData.filter(d => {
    if (filters.axis !== '全部' && d.axis !== filters.axis) return false;
    if (filters.mode !== '全部') {
      const mn = d.mode.replace(/\s/g,'');
      const fn = filters.mode.replace(/\s/g,'');
      if (!mn.includes(fn.replace('AI',''))) return false;
    }
    if (filters.ai !== '全部' && !d.aiTool.includes(filters.ai)) return false;
    if (q) {
      if (!(d.title+d.task+d.desc+d.content).toLowerCase().includes(q)) return false;
    }
    return true;
  });
  renderCards(filtered);
}

function getAxisTag(axis) {
  const map = { '寫作':'tag-writing','備課':'tag-lesson','學習':'tag-learning','工具':'tag-tool' };
  return map[axis] || 'tag-def';
}
function getAxisBar(axis) {
  const map = { '寫作':'writing','備課':'lesson','學習':'learning','工具':'tool' };
  return map[axis] || 'tool';
}
function getModeTag(mode) {
  const m = mode.replace(/\s/g,'');
  if (m.includes('協思')) return 'tag-xie';
  if (m.includes('協作')||m.includes('協做')) return 'tag-zuo';
  if (m.includes('助理')) return 'tag-li';
  return 'tag-def';
}

function renderCards(data) {
  const grid = document.getElementById('cardsGrid');
  document.getElementById('statsBar').innerHTML = `共 <span>${data.length}</span> 個提示詞`;
  window._filteredData = data;

  if (!data.length) {
    grid.innerHTML = `<div class="empty">🔍<br><br>找不到符合條件的提示詞</div>`;
    return;
  }

  grid.innerHTML = data.map((d, i) => {
    const barClass = getAxisBar(d.axis);
    const axisTag = `<span class="tag ${getAxisTag(d.axis)}">${d.axis}</span>`;
    const modeTag = d.mode ? `<span class="tag ${getModeTag(d.mode)}">${d.mode}</span>` : '';
    const aiTags = d.aiTool
      ? d.aiTool.split(/[\/,、]+/).map(t=>t.trim()).filter(Boolean)
          .map(t=>`<span class="tag tag-ai">${t}</span>`).join('')
      : '';
    const stepBadge = d.order ? `<span class="step-badge">步驟 ${d.order}</span>` : '';
    const desc = d.content || d.desc || '';

    return `
    <div class="card" onclick="openModal(${i})">
      <div class="card-top-bar ${barClass}"></div>
      <div class="card-inner">
        <div class="card-tags">${axisTag}${modeTag}${aiTags}</div>
        <div class="card-task">${d.task || ''}</div>
        <div class="card-title">${d.title}</div>
        <div class="card-desc">${desc}</div>
      </div>
      <div class="card-footer">
        ${stepBadge}
        <button class="copy-btn" onclick="event.stopPropagation();copyPrompt(this,${i})">複製 Prompt</button>
      </div>
    </div>`;
  }).join('');
}

function copyPrompt(btn, idx) {
  const d = window._filteredData[idx];
  navigator.clipboard.writeText(d.content).then(() => {
    btn.textContent = '✅ 已複製！';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => { btn.textContent = '📋 複製 Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function buildWorkflow() {
  document.getElementById('workflowGrid').innerHTML = WORKFLOW_SHEETS.map(w => `
    <button class="workflow-btn" onclick="openSheet('${w.name}')">
      <div class="wf-icon">${w.icon}</div>
      <div class="wf-name">${w.name}</div>
      <div class="wf-arrow">→</div>
    </button>`).join('');
}

function openSheet(name) {
  window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`, '_blank');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&tab==='prompt')||(i===1&&tab==='workflow'));
  });
  document.getElementById('promptSection').classList.toggle('active', tab==='prompt');
  document.getElementById('workflowSection').classList.toggle('active', tab==='workflow');
}

let _modalData = null;

function openModal(idx) {
  const d = window._filteredData[idx];
  _modalData = d;
  document.getElementById('modalTitle').textContent = d.title;
  document.getElementById('modalTask').textContent = d.task || '';
  document.getElementById('modalPrompt').textContent = d.content;

  const descEl = document.getElementById('modalDesc');
  if (d.desc && d.desc !== d.content) {
    descEl.textContent = d.desc;
    descEl.style.display = 'block';
  } else {
    descEl.style.display = 'none';
  }

  // Tags
  const axisTag = `<span class="tag ${getAxisTag(d.axis)}">${d.axis}</span>`;
  const modeTag = d.mode ? `<span class="tag ${getModeTag(d.mode)}">${d.mode}</span>` : '';
  const aiTags = d.aiTool
    ? d.aiTool.split(/[\/,、]+/).map(t=>t.trim()).filter(Boolean)
        .map(t=>`<span class="tag tag-ai">${t}</span>`).join('')
    : '';
  document.getElementById('modalTags').innerHTML = axisTag + modeTag + aiTags;

  const btn = document.getElementById('modalCopyBtn');
  btn.textContent = '📋 複製 Prompt';
  btn.classList.remove('copied');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function openSheetForEdit() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;
  window.open(url, '_blank');
}

function copyModalPrompt() {
  if (!_modalData) return;
  navigator.clipboard.writeText(_modalData.content).then(() => {
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = '✅ 已複製！';
    btn.classList.add('copied');
    showToast();
    setTimeout(() => { btn.textContent = '📋 複製 Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

// Close modal on Escape key
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

init();
</script>
